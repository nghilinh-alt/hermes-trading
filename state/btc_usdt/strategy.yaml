min_profit_usd: 5.0
trail_atr_mult: 2.0
max_trades_per_day: 3
# Session 11: daily + 4h trend filter
trend_filter:
  enabled: true
  daily_ema_period: 20
  ema_4h_period: 50
  ambiguous_band_pct: 0.3
  trend_4h_soft_discount: 0.7
