session_blocked_end_utc: 7
# Session 11: portfolio daily loss cap (USD)
max_portfolio_daily_loss_usd: 40.0
leverage_curve:
- - 0.5
  - 4
- - 0.6
  - 5
- - 0.75
  - 7
- - 1.0
  - 8
