      threshold: 30

  - name: ema_trend
    required: false
    weight: 0.6
    params:
      period: 50

  - name: macd
    required: false
    weight: 0.5
    params: {}

  - name: vwap
    required: false
    weight: 0.4
    params: {}

  - name: volume_spike
    required: false
    weight: 0.3
