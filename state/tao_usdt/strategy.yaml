      min_ratio: 1.5

  - name: bb_squeeze
    required: false
    weight: 0.3
    params: {}

  - name: fvg
    required: false
    weight: 0.4
    params: {}

  - name: order_block
    required: false
    weight: 0.4
    params:
      tolerance_pct: 0.5

  - name: sr_zone
    required: false
    weight: 0.3
